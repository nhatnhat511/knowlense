<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowlense</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <div class="brand">Knowlense</div>
          <p class="subtle">Boost Your TPT Rankings & Sales</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-title-row">
          <h2>Connection</h2>
          <span id="auth-badge" class="badge">Disconnected</span>
        </div>

        <div id="account-view" class="hidden">
          <p class="subtle">Connected account</p>
          <p id="account-email" class="account-email"></p>
          <div class="account-meta">
            <span class="subtle">Current plan</span>
            <span id="account-plan" class="plan-badge">Free</span>
          </div>
          <div class="settings-actions">
            <button id="disconnect-session" class="secondary-button" type="button">Disconnect</button>
            <button id="open-dashboard-site" class="ghost-button" type="button">Dashboard</button>
          </div>
        </div>

        <div id="connect-view">
          <p class="subtle">Connect your account to unlock Knowlense features inside the extension.</p>
          <p id="status" class="status">Connect your account to get started.</p>
          <div class="settings-actions">
            <button id="connect-session" class="primary-button" type="button">Connect account</button>
          </div>
        </div>
      </section>

    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
