<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowlense</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <div class="brand">Knowlense</div>
          <p class="subtle">Seller insight layer for TPT</p>
        </div>
        <button id="settings-toggle" class="icon-button" type="button" aria-label="Open settings">&#9881;</button>
      </header>

      <section id="settings-panel" class="panel hidden">
        <div class="panel-title-row">
          <h2>Settings</h2>
          <span class="badge">Local</span>
        </div>
        <label class="field">
          <span>API origin</span>
          <input id="api-origin" type="url" placeholder="https://api.knowlense.com" />
        </label>
        <div class="settings-actions">
          <button id="save-settings" class="secondary-button" type="button">Save</button>
          <button id="open-dashboard" class="ghost-button" type="button">Dashboard</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>Account</h2>
          <span id="auth-badge" class="badge">Guest</span>
        </div>

        <div id="account-view" class="hidden">
          <p class="subtle">Connected account</p>
          <p id="account-email" class="account-email"></p>
          <div class="settings-actions">
            <button id="sign-out" class="secondary-button" type="button">Sign out</button>
            <button id="open-site" class="ghost-button" type="button">Website</button>
          </div>
        </div>

        <form id="sign-in-form">
          <label class="field">
            <span>Email</span>
            <input id="email" type="email" autocomplete="username" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <p id="status" class="status">Use the same credentials as the website.</p>
          <div class="settings-actions">
            <button id="sign-in" class="primary-button" type="submit">Sign in</button>
            <button id="create-account" class="ghost-button" type="button">Create account</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
