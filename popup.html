<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowlense</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(148, 163, 184, 0.25);
        --primary: #0f766e;
        --primary-dark: #115e59;
        --secondary: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.16), transparent 40%),
          linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: var(--text);
      }

      .popup {
        padding: 18px;
      }

      .card {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.12);
        color: var(--primary-dark);
        font-size: 12px;
        font-weight: 700;
      }

      .description {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .account {
        margin: 0 0 16px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(241, 245, 249, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .account-label {
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .account-name {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
      }

      .account-plan {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 16px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(241, 245, 249, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .toggle-copy strong {
        display: block;
        font-size: 14px;
        margin-bottom: 4px;
      }

      .toggle-copy span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .toggle {
        position: relative;
        width: 48px;
        height: 28px;
        flex: 0 0 auto;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #cbd5e1;
        transition: background 0.2s ease;
      }

      .toggle-slider::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.18);
        transition: transform 0.2s ease;
      }

      .toggle input:checked + .toggle-slider {
        background: var(--primary);
      }

      .toggle input:checked + .toggle-slider::before {
        transform: translateX(20px);
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      #settingsButton {
        background: var(--secondary);
        color: var(--text);
      }

      #authButton {
        background: var(--primary);
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <section class="card">
        <div class="brand">
          <h1>Knowlense</h1>
          <span id="planBadge" class="badge">Free</span>
        </div>
        <p class="description">
          Highlight text on any page and get clean context with source-backed summaries.
        </p>
        <section id="accountPanel" class="account">
          <p class="account-label">Account</p>
          <p id="accountName" class="account-name">Not logged in</p>
          <p id="accountPlan" class="account-plan">Login to sync your Knowlense data.</p>
        </section>
        <section class="toggle-row">
          <div class="toggle-copy">
            <strong>Enable Auto-Highlight</strong>
            <span>Premium users can scan pages automatically for important terms.</span>
          </div>
          <label class="toggle" for="autoHighlightToggle">
            <input id="autoHighlightToggle" type="checkbox" />
            <span class="toggle-slider"></span>
          </label>
        </section>
        <p id="loginNotice" class="description" style="display: none; margin-top: -4px;">
          Login to access Premium features.
        </p>
        <div class="actions">
          <button id="settingsButton" type="button">Settings</button>
          <button id="authButton" type="button">Login / Sign up</button>
        </div>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
